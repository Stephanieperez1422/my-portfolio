<!DOCTYPE html>
<html>
<body>

<h2>PHP Loops Assignment</h2>

<script>

// ========== 1) FOR LOOP (1 to 18) ==========
// A for loop is used when you know how many times to repeat
// for(start; condition; increment)

document.write("<h3>1. For Loop (1-18)</h3>");

for(let i = 1; i <= 18; i++) {
    // let i = 1 → starting point
    // i <= 18 → keep going until i reaches 18
    // i++ → add 1 each time
    document.write(i + " ");
}

// ========== 2) WHILE LOOP (1 to 27) ==========
// A while loop runs AS LONG AS the condition is true
// Use this when you don't know exactly how many times to repeat

document.write("<h3>2. While Loop (1-27)</h3>");

let i = 1; // start value

while (i <= 27) {
    document.write(i + " ");
    i++; // Very important → without this it loops forever!
}

// ========== 3) DO-WHILE LOOP (1 to 15) ==========
// Runs the code FIRST, then checks the condition
// Difference from while → this always runs at least once

document.write("<h3>3. Do-While Loop (1-15)</h3>");

let j = 1; // using j instead of i because i is already declared above

do {
    document.write(j + " ");
    j++;
} while (j <= 15);

// ========== 4) SUM OF ODD NUMBERS (2 to 21) ==========
// We loop through 2 to 21 and only add the ODD numbers
// % is called modulus → gives you the REMAINDER of division
// Example: 7 % 2 = 1 (remainder) → odd!
// Example: 6 % 2 = 0 (no remainder) → even!

document.write("<h3>4. Sum of Odd Numbers (2-21)</h3>");

let sum = 0; // start total at 0

for (let k = 2; k <= 21; k++) {
    if (k % 2 != 0) { // if remainder is NOT 0 → it's odd
        sum += k; // same as: sum = sum + k
    }
}

document.write("Sum = " + sum);

// ========== 5) PRODUCT OF EVEN NUMBERS (3 to 17) ==========
// We loop through 3 to 17 and only MULTIPLY the EVEN numbers
// Start product at 1, NOT 0 → because anything x 0 = 0!

document.write("<h3>5. Product of Even Numbers (3-17)</h3>");

let product = 1;

for (let m = 3; m <= 17; m++) {
    if (m % 2 == 0) { // if remainder IS 0 → it's even
        product *= m; // same as: product = product * m
    }
}

document.write("Product = " + product);

</script>

</body>
</html>
